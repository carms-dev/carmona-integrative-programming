<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body onload="loadSettings()">
    <header>
      <div class="logo">Account Settings</div>

      <nav>
        <a href="profile.html" class="nav-btn">Profile</a>
        <button onclick="logout()" class="nav-btn">Logout</button>
      </nav>
    </header>

    <main class="dashboard">
      <section class="settings-card">
        <h2>Account Information</h2>

        <form onsubmit="saveSettings(event)" class="settings-form">
          <label>
            Full Name
            <input id="set-name" required />
          </label>

          <label>
            Email Address
            <input id="set-email" type="email" required />
          </label>

          <label>
            Address
            <input id="set-address" />
          </label>

          <button class="btn">Save Profile</button>
        </form>
      </section>

      <section class="settings-card">
        <h2>Change Password</h2>

        <form onsubmit="changePassword(event)" class="settings-form">
          <label>
            Current Password
            <input id="current-password" type="password" required />
          </label>

          <label>
            New Password
            <input id="new-password" type="password" required />
          </label>

          <label>
            Confirm New Password
            <input id="confirm-password" type="password" required />
          </label>

          <button class="btn">Update Password</button>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
